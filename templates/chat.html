<!DOCTYPE html>
<html>
<head>
    <title>Чат - {{ order.title }}</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .chat-container { max-width: 800px; margin: 0 auto; background: white; border-radius: 10px; overflow: hidden; }
        .chat-header { background: #007bff; color: white; padding: 15px; }
        .messages { height: 400px; overflow-y: scroll; padding: 15px; }
        .message { margin: 10px 0; }
        .my-message { text-align: right; }
        .my-message .bubble { background: #007bff; color: white; display: inline-block; padding: 8px 12px; border-radius: 15px; }
        .other-message .bubble { background: #e9ecef; color: black; display: inline-block; padding: 8px 12px; border-radius: 15px; }
        .time { font-size: 11px; color: #6c757d; margin-top: 3px; }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #ddd; }
        .input-area input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-right: 10px; }
        .input-area button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .back-btn { display: inline-block; margin: 20px; padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <a href="/" class="back-btn">← Назад</a>

    <div class="chat-container">
        <div class="chat-header">
            <h2>{{ order.title }}</h2>
            <small>Автор: {{ order.author }} | Исполнитель: {{ order.executor or 'Не назначен' }}</small>
        </div>

        <div class="messages" id="messages">
            {% for msg in order.messages %}
                <div class="message {% if msg.user == username %}my-message{% else %}other-message{% endif %}">
                    <div class="bubble">
                        <strong>{{ msg.user }}:</strong> {{ msg.message }}
                        <div class="time">{{ msg.time }}</div>
                    </div>
                </div>
            {% endfor %}
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Введите сообщение...">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        var socket = io();
        var room = '{{ order_id }}';
        var username = '{{ username }}';

        socket.emit('join', {room: room});

        function sendMessage() {
            var input = document.getElementById('messageInput');
            var message = input.value.trim();
            if (message) {
                socket.emit('private_message', {room: room, message: message});
                input.value = '';
            }
        }

        socket.on('message', function(data) {
            var messagesDiv = document.getElementById('messages');
            var div = document.createElement('div');
            div.className = 'message ' + (data.user === username ? 'my-message' : 'other-message');
            div.innerHTML = '<div class="bubble"><strong>' + data.user + ':</strong> ' + data.message +
                           '<div class="time">' + data.time + '</div></div>';
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });

        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        // Скролл вниз при загрузке
        var messagesDiv = document.getElementById('messages');
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    </script>
</body>
</html>
